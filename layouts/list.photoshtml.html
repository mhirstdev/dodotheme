{{ define "main" }}
    <section class="section-head"><span class="section-label">Galerie</span><span class="rule"></span></section>

    <div class="photos-grid">
    {{- $list := where .Site.RegularPages ".Params.photos" "!=" nil -}}
    {{ range $list }}
        <a href="{{ .Permalink }}">{{ range first 1 .Params.photos }}<img src="{{ . }}" loading="lazy" alt="" />{{ end }}</a>
    {{ end }}
    </div>
{{ end }}
